services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: farmman-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: farmman
      POSTGRES_USER: farmman
      POSTGRES_PASSWORD: farmman
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

