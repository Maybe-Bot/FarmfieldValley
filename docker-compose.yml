services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: loam-ledger-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: loam_ledger
      POSTGRES_USER: loam_ledger
      POSTGRES_PASSWORD: loam_ledger
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

