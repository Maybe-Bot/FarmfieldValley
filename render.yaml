services:
  - type: web
    name: loam-ledger-api
    runtime: node
    plan: free
    region: ohio
    buildCommand: npm install && npm run build:api
    preDeployCommand: npm run db:migrate
    startCommand: npm --workspace apps/api run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: loam-ledger-db
          property: connectionString
      - key: CSRF_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      - key: PUBLIC_API_URL
        sync: false
      - key: PUBLIC_WEB_URL
        sync: false
      - key: EMAIL_DELIVERY_MODE
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  - type: static
    name: loam-ledger-web
    buildCommand: npm install && npm run build:web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: loam-ledger-db
    plan: free
    region: ohio
    postgresMajorVersion: "17"
